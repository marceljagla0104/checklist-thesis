<h2 mat-dialog-title>{{"TAKE_PICTURE" | translate}}</h2>
<mat-dialog-content>
  <div>
    <webcam
      *ngIf="!webcamImage"
      [trigger]="invokeObservable"
      (imageCapture)="captureImg($event)"
    ></webcam>
    <div *ngIf="webcamImage">
      <img [src]="webcamImage.imageAsDataUrl" width="100%" />
    </div>
  </div>
  <div class="buttons">
    <app-button [disabled]="disabled" (click)="getSnapshot()">
      {{"TAKE_PICTURE" | translate}}
    </app-button>

    <app-button [disabled]="disabled" (click)="discard()">
      {{"DISCARD" | translate}}
    </app-button>
  </div>
</mat-dialog-content>

<mat-dialog-actions>
  <button mat-button class="action-button" (click)="onSave()">
    {{ "SAVE" | translate}}
  </button>
  <button mat-button class="action-button" (click)="onCancel()">
    {{"CANCEL" | translate}}
  </button>
</mat-dialog-actions>
