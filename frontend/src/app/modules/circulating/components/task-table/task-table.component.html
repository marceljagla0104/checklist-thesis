<table
  *ngIf="tasks.length > 0; else info"
  mat-table
  [dataSource]="tasks"
  class="mat-elevation-z8"
>
  <!-- Room Column -->
  <ng-container matColumnDef="room">
    <th mat-header-cell *matHeaderCellDef>{{ "ROOM" | translate }}</th>
    <td mat-cell *matCellDef="let task">{{ task.roomId }}</td>
  </ng-container>

  <!-- Task Description Column -->
  <ng-container matColumnDef="description">
    <th mat-header-cell *matHeaderCellDef>{{ "TASK" | translate }}</th>
    <td mat-cell *matCellDef="let task">{{ task.description }}</td>
  </ng-container>

  <!-- StartedAt Column -->
  <ng-container matColumnDef="startedAt">
    <th mat-header-cell *matHeaderCellDef>{{ "STARTED_AT" | translate }}</th>
    <td mat-cell *matCellDef="let task">{{ task.startedAt | timestamp }}</td>
  </ng-container>

  <!-- StartedAt Column -->
  <ng-container matColumnDef="checked">
    <th mat-header-cell *matHeaderCellDef></th>
    <td mat-cell *matCellDef="let task">
      <input
        class="input-checkbox"
        type="checkbox"
        [checked]="!!task.finishedAt"
        (click)="checkTask($event, task)"
      />
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
</table>

<ng-template #info>
  <div class="info">{{ "NO_TASKS" | translate }}</div>
</ng-template>
